{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GRUPPE-8{% endblock %}</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="[https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css](https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css)">
    
    <style>
        :root {
            --bg-dark: #121415;
            --card-bg: #1b1e20;
            --accent-green: #a8e63d;
            --border-subtle: #2c3034;
            --text-muted: #8a8d91;
            --text-bright: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            margin: 0;
        }

        /* ── SVG Background Leaves ── */
        .leaf-left, .leaf-right {
            position: fixed;
            bottom: 0;
            width: 400px;
            height: 700px;
            z-index: 0;
            pointer-events: none;
        }
        .leaf-left  { left: -100px; }
        .leaf-right { right: -100px; transform: scaleX(-1); }

        /* ── Auth Card ── */
        .auth-card {
            position: relative;
            z-index: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .brand-logo {
            text-align: center;
            font-weight: 800;
            font-size: 2.5rem;
            color: var(--accent-green);
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        /* ── Form Styling ── */
        label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            background-color: #121415;
            border: 1px solid var(--border-subtle);
            color: var(--text-bright);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background-color: #121415;
            border-color: var(--accent-green);
            color: var(--text-bright);
            box-shadow: 0 0 0 1px var(--accent-green);
        }

        .btn-primary {
            background-color: var(--accent-green);
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-weight: 700;
            color: #121415;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            background-color: #97d132;
            color: #121415;
            transform: translateY(-1px);
        }

        .divider {
            border-top: 1px solid var(--border-subtle);
            margin: 1.5rem 0;
        }

        .auth-footer {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
        }

        /* ── Alert Styling ── */
        .alert {
            border-radius: 8px;
            font-size: 0.85rem;
            padding: 0.75rem;
            border: 1px solid transparent;
            margin-bottom: 1.5rem;
        }
        .alert-success { background: rgba(168, 230, 61, 0.1); color: var(--accent-green); border-color: rgba(168, 230, 61, 0.2); }
        .alert-danger, .alert-error { background: rgba(248, 113, 113, 0.1); color: #f87171; border-color: rgba(248, 113, 113, 0.2); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Shared SVG Decoration -->
    <svg class="leaf-left" viewBox="0 0 340 600" xmlns="http://www.w3.org/2000/svg">
        <path d="M180 600 C155 550 110 490 90 420 C70 350 85 280 130 220 C165 172 215 148 245 125 C232 185 218 245 228 300 C238 355 260 400 268 445 C276 490 255 548 240 600 Z" fill="#1a3d1f" opacity="0.4"/>
        <path d="M195 600 C188 555 168 508 158 462 C150 424 155 385 170 348" fill="none" stroke="#a8e63d" stroke-width="1.2" opacity="0.1"/>
    </svg>

    <svg class="leaf-right" viewBox="0 0 340 600" xmlns="http://www.w3.org/2000/svg">
        <path d="M180 600 C155 550 110 490 90 420 C70 350 85 280 130 220 C165 172 215 148 245 125 C232 185 218 245 228 300 C238 355 260 400 268 445 C276 490 255 548 240 600 Z" fill="#1a3d1f" opacity="0.4"/>
    </svg>

    <div class="auth-card">
        <div class="brand-logo">GRUPPE-8</div>
        
        {% block auth_header %}{% endblock %}

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}

        <div class="divider"></div>
        <div class="auth-footer">
            {% block auth_footer %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
