{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GRUPPE-8</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-dark: #121415;
            --card-bg: #1b1e20;
            --accent-green: #a8e63d;
            --border-subtle: #2c3034;
            --text-muted: #8a8d91;
            --text-bright: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Navbar Redesign */
        .navbar {
            background-color: rgba(18, 20, 21, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.75rem 2rem;
        }
        .navbar-brand {
            color: var(--text-bright);
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .user-tag {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Card Redesign */
        .premium-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }
        .premium-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-3px);
        }

        /* The signature vertical accent bar */
        .accent-bar {
            position: absolute; 
            left: 0; 
            top: 20%; 
            bottom: 20%; 
            width: 4px; 
            background: var(--accent-green); 
            border-radius: 0 4px 4px 0;
        }

        .welcome-section {
            margin-top: 3rem;
            margin-bottom: 2rem;
        }
        .welcome-section h2 {
            font-weight: 700;
            font-size: 1.75rem;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            color: var(--text-bright);
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
        }

        /* Eye Toggle Button */
        .eye-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            transition: color 0.2s;
            padding: 0;
        }
        .eye-btn:hover { color: var(--accent-green); }

        .btn-logout {
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            padding: 0.4rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-logout:hover {
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        .value-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand">GRUPPE-8</span>
            <div class="ms-auto d-flex align-items-center gap-4">
                <span class="user-tag"><i class="bi bi-person-circle me-2"></i>{{ user.username }}</span>
                <a href="/users/logout/" class="btn-logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-section">
            <div class="row align-items-end">
                <div class="col-md-8">
                    <h2 class="mb-1">Welcome back, {{ user.username }} 👋</h2>
                    <p class="text-muted">Here is what's happening with your portfolio today.</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <p class="stat-label mb-1">Total Net Worth</p>
                    <div class="value-wrapper justify-content-md-end">
                        <h3 class="sensitive-value mb-0 fw-bold" data-value="{{net_worth|floatformat:2}}" style="color: var(--accent-green);">****</h3>
                        <button id="toggle-visibility" class="eye-btn">
                            <i id="eye-icon" class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <a href="/portfolio/assets/" class="premium-card">
                    <div class="accent-bar"></div>
                    <p class="stat-label">Total Assets</p>
                    <h2 class="stat-value sensitive-value" data-value="{{total_assets|floatformat:2}}">****</h2>
                    <div class="mt-2" style="font-size: 0.8rem; color: var(--accent-green);">
                        <i class="bi bi-arrow-up"></i> Live Tracking
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="/portfolio/stocks/" class="premium-card">
                    <div class="accent-bar" style="background: #3498db;"></div> <p class="stat-label">Stocks Value</p>
                    <h2 class="stat-value sensitive-value" data-value="{{total_stock|floatformat:2}}">****</h2>
                    <div class="mt-2" style="font-size: 0.8rem; color: var(--text-muted);">
                        Market Portfolio
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="/portfolio/cash/" class="premium-card">
                    <div class="accent-bar" style="background: #f1c40f;"></div> <p class="stat-label">Available Cash</p>
                    <h2 class="stat-value sensitive-value" data-value="{{total_cash|floatformat:2}}">****</h2>
                    <div class="mt-2" style="font-size: 0.8rem; color: var(--text-muted);">
                        Liquid Assets
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="{% static 'dashboard/js/toggle.js' %}"></script>
</body>
</html>
