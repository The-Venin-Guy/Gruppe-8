<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GRUPPE-8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f9f9f9;
            color: #ffffff;
            min-height: 100vh;
        }
        .navbar {
            background-color: #1a3d1f;
            border-bottom: 2px solid #a8e63d;
            padding: 1rem 2rem;
        }
        .navbar-brand {
            color: #a8e63d;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .nav-link {
            color: #ffffff !important;
            font-size: 0.9rem;
        }
        .nav-link:hover { color: #a8e63d !important; }
        .welcome-card {
            background-color: #1a3d1f;
            border: 2px solid #2d6b35;
            border-top: 4px solid #a8e63d;
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
        }
        .welcome-card h2 {
            color: #a8e63d;
            font-weight: 700;
        }
        .welcome-card p {
            color: #9ca3af;
        }
        .stat-card {
            background-color: #1a3d1f;
            border: 1px solid #2d6b35;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 1.5rem;
        }
        .stat-card h5 {
            color: #9ca3af;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card h2 {
            color: #a8e63d;
            font-weight: 700;
            font-size: 2rem;
        }
        .btn-logout {
            background-color: transparent;
            border: 1px solid #a8e63d;
            color: #a8e63d;
            border-radius: 8px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }
        .btn-logout:hover {
            background-color: #a8e63d;
            color: #0d1a0f;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <span class="navbar-brand">GRUPPE-8 | DASHBOARD</span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="nav-link">{{ user.username }}</span>
            <a href="/users/logout/" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h2>Welcome back, {{ user.username }} 👋</h2>
            <p>Your portfolio dashboard is being built. Check back as we add features each day.</p>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Total Assets</h5>
                    <h2>$0.00</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Stocks Value</h5>
                    <h2>$0.00</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5>Cash</h5>
                    <h2>$0.00</h2>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
