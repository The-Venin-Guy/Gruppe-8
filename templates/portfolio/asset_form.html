<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} | Portfolio Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1a0f; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background-color: #1a3d1f; border: none; border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; border-top: 5px solid #a8e63d; }
        h2 { color: #a8e63d; font-weight: 700; margin-bottom: 1.5rem; }
        label { color: #9ca3af; font-size: 0.85rem; font-weight: 600; }
        .form-control, .form-select {
            background-color: #0d1a0f;
            border: 1.5px solid #2d6b35;
            color: #ffffff;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0d1a0f;
            border-color: #a8e63d;
            color: #ffffff;
            box-shadow: 0 0 0 3px rgba(168,230,61,0.15);
        }
        .form-control::placeholder { color: #4b5563; }
        .btn-submit {
            background-color: #a8e63d;
            border: none;
            border-radius: 8px;
            padding: 0.65rem;
            font-weight: 700;
            color: #0d1a0f;
            width: 100%;
        }
        .btn-submit:hover { background-color: #8fd42a; }
        .back-link { color: #6b7280; font-size: 0.85rem; text-decoration: none; display: block; text-align: center; margin-top: 1rem; }
        .back-link:hover { color: #a8e63d; }
        select option { background-color: #1a3d1f; }
    </style>
</head>
<body>
    <div class="card">
        <h2>{{ title }}</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label>{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn-submit mt-2">Save</button>
        </form>
        <a href="/portfolio/assets/" class="back-link">← Back to Assets</a>
    </div>
</body>
</html>
