{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | GRUPPE-8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body class="g8-auth-body">

    <div class="g8-form-shell anim-fadeUp">

        <!-- Header -->
        <div class="g8-form-shell__head">
            <h1 class="g8-form-shell__title">{{ title }}</h1>
            <a href="/portfolio/assets/" class="g8-form-shell__back">
                <i class="bi bi-arrow-left"></i> Back to Assets
            </a>
        </div>

        <!-- Form -->
        <form method="POST" class="g8-form">
            {% csrf_token %}
            {% for field in form %}
            <div class="g8-field">
                <label class="g8-label" for="{{ field.id_for_label }}">
                    {{ field.label }}
                </label>
                <div class="g8-input-wrap">
                    {{ field }}
                </div>
                {% if field.errors %}
                    {% for error in field.errors %}
                    <p class="g8-field__error"><i class="bi bi-exclamation-circle"></i> {{ error }}</p>
                    {% endfor %}
                {% endif %}
                {% if field.help_text %}
                    <p class="g8-field__hint">{{ field.help_text }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-g8 btn-g8--gold g8-form__submit">
                <i class="bi bi-check-lg"></i> Save Asset
            </button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.g8-input-wrap input, .g8-input-wrap select, .g8-input-wrap textarea').forEach(el => {
            el.classList.add('g8-input');
            if (el.tagName === 'SELECT') el.classList.add('g8-input--icon-right');
        });
    </script>

</body>
</html>
