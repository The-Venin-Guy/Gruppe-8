{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | GRUPPE-8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body class="g8-auth-body">

    <div class="g8-form-shell anim-fadeUp">

        <!-- Header -->
        <div class="g8-form-shell__head">
            <h1 class="g8-form-shell__title">{{ title }}</h1>
            <a href="{{ back_url }}" class="g8-form-shell__back">
                <i class="bi bi-arrow-left"></i> Cancel
            </a>
        </div>

        <!-- Form -->
        <form method="POST" class="g8-form" id="sellForm">
            {% csrf_token %}

            <!-- Sale Price -->
            <div class="g8-field">
                <label class="g8-label" for="id_sale_price">
                    Sale Price {% if is_stock %}<span class="g8-label__sub">per share</span>{% endif %}
                </label>
                <div class="g8-input-wrap">
                    <span class="g8-input-icon g8-input-icon--text">$</span>
                    {{ form.sale_price }}
                </div>
            </div>

            <!-- Sale Date -->
            <div class="g8-field">
                <label class="g8-label" for="id_sale_date">Sale Date</label>
                <div class="g8-input-wrap">
                    <i class="bi bi-calendar3 g8-input-icon"></i>
                    {{ form.sale_date }}
                </div>
            </div>

            {% if is_stock %}
            <!-- Toggle: convert to cash -->
            <div class="g8-toggle-field">
                <div class="g8-toggle-field__text">
                    <p class="g8-toggle-field__label">Convert to Cash</p>
                    <p class="g8-toggle-field__sub">Move proceeds directly into a cash account</p>
                </div>
                <label class="g8-switch">
                    {{ form.convert_to_cash }}
                    <span class="g8-switch__track">
                        <span class="g8-switch__thumb"></span>
                    </span>
                </label>
            </div>

            <!-- Cash account selector (conditional) -->
            <div class="g8-reveal" id="cashSection">
                <div class="g8-reveal__inner g8-field">
                    <label class="g8-label" for="id_cash_account">
                        <i class="bi bi-wallet2"></i> Select Cash Account
                    </label>
                    <div class="g8-input-wrap">
                        <i class="bi bi-chevron-down g8-input-icon g8-input-icon--right"></i>
                        {{ form.cash_account }}
                    </div>
                </div>
            </div>
            {% endif %}

            <!-- Submit -->
            <button type="submit" class="btn-g8 btn-g8--red g8-form__submit">
                <i class="bi bi-check-lg"></i> Confirm Sale
            </button>
        </form>

        

    </div>

    <script>
        /* Apply g8-input class to Django-rendered fields */
        document.querySelectorAll('.g8-input-wrap input, .g8-input-wrap select').forEach(el => {
            if (!el.classList.contains('g8-switch__input')) {
                el.classList.add('g8-input', 'g8-input--icon');
            }
        });

        /* Right-icon select padding */
        document.querySelectorAll('.g8-input-wrap select.g8-input').forEach(el => {
            el.classList.add('g8-input--icon-right');
        });

        /* Cash section reveal toggle */
        const checkbox    = document.getElementById('id_convert_to_cash');
        const cashSection = document.getElementById('cashSection');

        if (checkbox && cashSection) {
            function syncReveal() {
                cashSection.classList.toggle('g8-reveal--open', checkbox.checked);
            }

            checkbox.addEventListener('change', syncReveal);
            syncReveal(); /* run on load in case of form re-render */
        }
    </script>

</body>
</html>
