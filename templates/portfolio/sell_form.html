<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} | Portfolio Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1a0f; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background-color: #1a3d1f; border: none; border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; border-top: 5px solid #f87171; }
        h2 { color: #f87171; font-weight: 700; margin-bottom: 0.3rem; }
        .subtitle { color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
        label { color: #9ca3af; font-size: 0.85rem; font-weight: 600; }
        .form-control, .form-select { background-color: #0d1a0f; border: 1.5px solid #2d6b35; color: #ffffff; border-radius: 8px; }
        .form-control:focus, .form-select:focus { background-color: #0d1a0f; border-color: #f87171; color: #ffffff; box-shadow: 0 0 0 3px rgba(248,113,113,0.15); }
        .form-check-input:checked { background-color: #a8e63d; border-color: #a8e63d; }
        .form-check-label { color: #9ca3af; font-size: 0.9rem; }
        .btn-sell { background-color: #f87171; border: none; border-radius: 8px; padding: 0.65rem; font-weight: 700; color: #ffffff; width: 100%; }
        .btn-sell:hover { background-color: #ef4444; color: #ffffff; }
        .back-link { color: #6b7280; font-size: 0.85rem; text-decoration: none; display: block; text-align: center; margin-top: 1rem; }
        .back-link:hover { color: #a8e63d; }
        select option { background-color: #1a3d1f; }
        .cash-section { display: none; margin-top: 1rem; padding: 1rem; background-color: #0d1a0f; border-radius: 8px; border: 1px solid #2d6b35; }
    </style>
</head>
<body>
    <div class="card">
        <h2>{{ title }}</h2>
        <p class="subtitle">Enter the details of your sale below</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Sale Price {% if is_stock %}(per share){% endif %}</label>
                {{ form.sale_price }}
            </div>
            <div class="mb-3">
                <label>Sale Date</label>
                {{ form.sale_date }}
            </div>

            {% if is_stock %}
            <div class="mb-3 form-check">
                {{ form.convert_to_cash }}
                <label class="form-check-label ms-2">Convert proceeds to a cash account?</label>
            </div>
            <div class="cash-section" id="cashSection">
                <label>Select Cash Account</label>
                {{ form.cash_account }}
            </div>
            {% endif %}

            <button type="submit" class="btn-sell mt-3">Confirm Sale</button>
        </form>
        <a href="{{ back_url }}" class="back-link">← Cancel</a>
    </div>

    {% if is_stock %}
    <script>
        const checkbox = document.getElementById('id_convert_to_cash');
        const cashSection = document.getElementById('cashSection');
        checkbox.addEventListener('change', function() {
            cashSection.style.display = this.checked ? 'block' : 'none';
        });
    </script>
    {% endif %}
</body>
</html>
