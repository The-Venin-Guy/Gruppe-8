<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} | Portfolio Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1a0f; color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background-color: #1a3d1f; border: none; border-radius: 16px; padding: 2rem; width: 100%; max-width: 500px; border-top: 5px solid #a8e63d; }
        h2 { color: #a8e63d; font-weight: 700; margin-bottom: 1.5rem; }
        label { color: #9ca3af; font-size: 0.85rem; font-weight: 600; }
        .form-control { background-color: #0d1a0f; border: 1.5px solid #2d6b35; color: #ffffff; border-radius: 8px; }
        .form-control:focus { background-color: #0d1a0f; border-color: #a8e63d; color: #ffffff; box-shadow: 0 0 0 3px rgba(168,230,61,0.15); }
        .form-control::placeholder { color: #4b5563; }
        .btn-submit { background-color: #a8e63d; border: none; border-radius: 8px; padding: 0.65rem; font-weight: 700; color: #0d1a0f; width: 100%; }
        .btn-submit:hover { background-color: #8fd42a; }
        .back-link { color: #6b7280; font-size: 0.85rem; text-decoration: none; display: block; text-align: center; margin-top: 1rem; }
        .back-link:hover { color: #a8e63d; }
        .hint { color: #6b7280; font-size: 0.78rem; margin-top: 0.3rem; }

        /* Autocomplete dropdown */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #1a3d1f;
            border: 1px solid #2d6b35;
            border-radius: 8px;
            z-index: 100;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            margin-top: 4px;
        }
        .autocomplete-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #0d1a0f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background-color: #2d6b35; }
        .autocomplete-ticker { color: #a8e63d; font-weight: 700; font-size: 0.9rem; }
        .autocomplete-name { color: #9ca3af; font-size: 0.8rem; max-width: 65%; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loading-hint { color: #6b7280; font-size: 0.78rem; padding: 0.7rem 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>{{ title }}</h2>
        <form method="POST" id="stockForm">
            {% csrf_token %}

            <!-- Ticker with autocomplete -->
            <div class="mb-3">
                <label for="id_ticker">Ticker Symbol</label>
                <div class="autocomplete-wrapper">
                    <input
                        type="text"
                        name="ticker"
                        id="id_ticker"
                        class="form-control"
                        placeholder="e.g. AAPL, TSLA, GOOGL"
                        autocomplete="off"
                        value="{{ form.ticker.value|default:'' }}"
                    >
                    <div class="autocomplete-dropdown" id="tickerDropdown"></div>
                </div>
                <p class="hint">Start typing a ticker or company name</p>
            </div>

            <!-- Company name — auto filled -->
            <div class="mb-3">
                <label for="id_company_name">Company Name</label>
                <input
                    type="text"
                    name="company_name"
                    id="id_company_name"
                    class="form-control"
                    placeholder="Auto-filled when you select a ticker"
                    value="{{ form.company_name.value|default:'' }}"
                >
            </div>

            <!-- Rest of the fields -->
            <div class="mb-3">
                <label for="id_shares">Number of Shares</label>
                {{ form.shares }}
            </div>
            <div class="mb-3">
                <label for="id_purchase_price">Purchase Price per Share</label>
                {{ form.purchase_price }}
            </div>
            <div class="mb-3">
                <label for="id_purchase_date">Purchase Date</label>
                {{ form.purchase_date }}
            </div>

            <button type="submit" class="btn-submit mt-2">Save</button>
        </form>
        <a href="/portfolio/stocks/" class="back-link">← Back to Stocks</a>
    </div>

    <script>
        const tickerInput = document.getElementById('id_ticker');
        const companyInput = document.getElementById('id_company_name');
        const dropdown = document.getElementById('tickerDropdown');
        let debounceTimer;

        tickerInput.addEventListener('input', function () {
            clearTimeout(debounceTimer);
            const query = this.value.trim();

            if (query.length < 1) {
                dropdown.style.display = 'none';
                dropdown.innerHTML = '';
                return;
            }

            // Wait 300ms after user stops typing before searching
            debounceTimer = setTimeout(() => {
                dropdown.innerHTML = '<p class="loading-hint">Searching...</p>';
                dropdown.style.display = 'block';

                fetch(`/portfolio/ticker-search/?q=${encodeURIComponent(query)}`)
                    .then(res => res.json())
                    .then(results => {
                        if (results.length === 0) {
                            dropdown.innerHTML = '<p class="loading-hint">No results found</p>';
                            return;
                        }
                        dropdown.innerHTML = '';
                        results.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'autocomplete-item';
                            div.innerHTML = `
                                <span class="autocomplete-ticker">${item.ticker}</span>
                                <span class="autocomplete-name">${item.name}</span>
                            `;
                            div.addEventListener('click', () => {
                                tickerInput.value = item.ticker;
                                companyInput.value = item.name;
                                dropdown.style.display = 'none';
                            });
                            dropdown.appendChild(div);
                        });
                    })
                    .catch(() => {
                        dropdown.innerHTML = '<p class="loading-hint">Search unavailable</p>';
                    });
            }, 300);
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function (e) {
            if (!tickerInput.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    </script>
</body>
</html>
