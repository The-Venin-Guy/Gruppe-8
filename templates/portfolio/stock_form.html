{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | GRUPPE-8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body class="g8-auth-body">

    <div class="g8-form-shell anim-fadeUp">

        <!-- Header -->
        <div class="g8-form-shell__head">
            <h1 class="g8-form-shell__title ">{{ title }}</h1>
            <a href="/portfolio/stocks/" class="g8-form-shell__back">
                <i class="bi bi-arrow-left"></i> Back to Stocks
            </a>
        </div>

        <!-- Form -->
        <form method="POST" id="stockForm" class="g8-form">
            {% csrf_token %}

            <!-- Ticker -->
            <div class="g8-field">
                <label class="g8-label" for="id_ticker">
                    Ticker Symbol
                </label>
                <div class="g8-autocomplete">
                    <div class="g8-input-wrap">
                        <i class="bi bi-search g8-input-icon"></i>
                        <input
                            type="text"
                            name="ticker"
                            id="id_ticker"
                            class="g8-input g8-input--icon"
                            placeholder="e.g. AAPL, TSLA, GOOGL"
                            autocomplete="off"
                            value="{{ form.ticker.value|default:'' }}"
                        >
                    </div>
                    <div class="g8-autocomplete__dropdown" id="tickerDropdown"></div>
                </div>
                <p class="g8-field__hint">Start typing a ticker or company name to search</p>
            </div>

            <!-- Company name -->
            <div class="g8-field">
                <label class="g8-label" for="id_company_name">Company Name</label>
                <div class="g8-input-wrap">
                    <i class="bi bi-building g8-input-icon"></i>
                    <input
                        type="text"
                        name="company_name"
                        id="id_company_name"
                        class="g8-input g8-input--icon"
                        placeholder="Auto-filled on ticker select"
                        value="{{ form.company_name.value|default:'' }}"
                    >
                </div>
            </div>

            <!-- Two-col row: Shares + Price -->
            <div class="g8-field-row">
                <div class="g8-field">
                    <label class="g8-label" for="id_shares">Shares</label>
                    <div class="g8-input-wrap">
                        <i class="bi bi-stack g8-input-icon"></i>
                        {{ form.shares }}
                    </div>
                </div>
                <div class="g8-field">
                    <label class="g8-label" for="id_purchase_price">Price per Share</label>
                    <div class="g8-input-wrap">
                        <span class="g8-input-icon g8-input-icon--text">$</span>
                        {{ form.purchase_price }}
                    </div>
                </div>
            </div>

            <!-- Purchase date -->
            <div class="g8-field">
                <label class="g8-label" for="id_purchase_date">Purchase Date</label>
                <div class="g8-input-wrap">
                    <i class="bi bi-calendar3 g8-input-icon"></i>
                    {{ form.purchase_date }}
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-g8 btn-g8--gold g8-form__submit">
                <i class="bi bi-check-lg"></i> Save Position
            </button>
        </form>
    </div>

    <script>
        /* ── Autocomplete ────────────────────────────────────── */
        const tickerInput  = document.getElementById('id_ticker');
        const companyInput = document.getElementById('id_company_name');
        const dropdown     = document.getElementById('tickerDropdown');
        let   debounceTimer;

        tickerInput.addEventListener('input', function () {
            clearTimeout(debounceTimer);
            const query = this.value.trim();

            if (query.length < 1) {
                closeDropdown();
                return;
            }

            debounceTimer = setTimeout(() => {
                dropdown.innerHTML = '<p class="g8-autocomplete__hint">Searching…</p>';
                dropdown.classList.add('g8-autocomplete__dropdown--open');

                fetch(`/portfolio/ticker-search/?q=${encodeURIComponent(query)}`)
                    .then(r => r.json())
                    .then(results => {
                        if (!results.length) {
                            dropdown.innerHTML = '<p class="g8-autocomplete__hint">No results found</p>';
                            return;
                        }
                        dropdown.innerHTML = '';
                        results.forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'g8-autocomplete__item';
                            div.innerHTML = `
                                <span class="g8-ticker">${item.ticker}</span>
                                <span class="g8-autocomplete__name">${item.name}</span>
                            `;
                            div.addEventListener('click', () => {
                                tickerInput.value  = item.ticker;
                                companyInput.value = item.name;
                                closeDropdown();
                            });
                            dropdown.appendChild(div);
                        });
                    })
                    .catch(() => {
                        dropdown.innerHTML = '<p class="g8-autocomplete__hint">Search unavailable</p>';
                    });
            }, 300);
        });

        document.addEventListener('click', e => {
            if (!tickerInput.contains(e.target) && !dropdown.contains(e.target)) closeDropdown();
        });

        function closeDropdown() {
            dropdown.innerHTML = '';
            dropdown.classList.remove('g8-autocomplete__dropdown--open');
        }

        /* ── Apply g8-input class to Django-rendered fields ─── */
        document.querySelectorAll('.g8-input-wrap input, .g8-input-wrap select').forEach(el => {
            el.classList.add('g8-input', 'g8-input--icon');
        });
    </script>

</body>
</html>
