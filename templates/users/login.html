{% extends 'base_auth.html' %}

{% block title %}Login | GRUPPE-8{% endblock %}

{% block auth_header %}
<div class="g8-auth-heading">
    <h2 class="g8-auth-heading__title">Welcome back</h2>
    <p class="g8-auth-heading__sub">Log in to manage your portfolio</p>
</div>
{% endblock %}

{% block content %}
<form method="POST" class="g8-auth-card__body">
    {% csrf_token %}

    <div class="g8-field">
        <label class="g8-label" for="id_username">Username</label>
        <div class="g8-input-wrap">
            <i class="bi bi-person g8-input-icon"></i>
            <input type="text" name="username" id="id_username"
                   class="g8-input g8-input--icon"
                   placeholder="Your username"
                   required autofocus autocomplete="username">
        </div>
    </div>

    <div class="g8-field">
        <div class="g8-auth-field-row">
            <label class="g8-label" for="id_password">Password</label>
        </div>
        <div class="g8-input-wrap">
            <i class="bi bi-lock g8-input-icon"></i>
            <input type="password" name="password" id="id_password"
                   class="g8-input g8-input--icon g8-input--has-reveal"
                   placeholder="Your password"
                   required autocomplete="current-password">
            <button type="button" class="g8-input-reveal" aria-label="Toggle password" data-target="id_password">
                <i class="bi bi-eye"></i>
            </button>
        </div>
    </div>

    <button type="submit" class="btn-g8 btn-g8--gold">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
    </button>
</form>
{% endblock %}

{% block auth_footer %}
<p class="g8-auth-footer-text">
    Don't have an account? <a href="/users/signup/">Create Account</a>
</p>
{% endblock %}
